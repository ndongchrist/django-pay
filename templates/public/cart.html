{% extends "public/base.html" %}
{% load static %}

{% block content %}
<div class="container" style="margin-top: 3rem;">
    <h1 class="section-title" style="font-size:2.8rem;">Your Basket</h1>

    <div id="cart-items" style="margin-top:2rem;"></div>

    <!-- Summary -->
    <div id="cart-summary" style="display:none; max-width:420px; margin:3rem auto 0; background:#111; color:#F5B81B; padding:2rem; border-radius:20px;">
        <div style="display:flex; justify-content:space-between; font-size:1.1rem;">
            <span>Subtotal</span>
            <span id="cart-subtotal">$0.00</span>
        </div>
        <div style="display:flex; justify-content:space-between; margin-top:1rem; font-size:1.1rem; border-top:1px solid #333; padding-top:1rem;">
            <span style="font-weight:700;">Total</span>
            <span id="cart-total" style="font-weight:700;">$0.00</span>
        </div>
        <p style="text-align:center; margin-top:1.5rem; font-size:0.95rem; opacity:0.9;">
            ✨ Free shipping on orders over $100
        </p>
        <button id="proceed-checkout-btn"
                style="width:100%; margin-top:1.5rem; padding:18px; background:#F5B81B; color:#111; border:none; border-radius:60px; font-weight:700; font-size:1.2rem;">
            PROCEED TO CHECKOUT →
        </button>
    </div>

    <div style="text-align:center; margin-top:3rem;">
        <a href="{% url 'home' %}" style="color:#111; text-decoration:underline;">← Continue Shopping</a>
    </div>
</div>
{% endblock %}
