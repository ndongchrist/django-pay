{% extends "public/base.html" %}
{% load static %}

{% block content %}
<div class="container" style="margin-top: 3rem; max-width: 1100px; margin-left:auto; margin-right:auto;">
    <h1 class="section-title" style="font-size:2.8rem; text-align:center;">Checkout</h1>
    
    <div style="display:grid; grid-template-columns: 2fr 1fr; gap:4rem; margin-top:3rem;">
        <!-- Left: Payment form placeholder -->
        <div>
            <div style="background:#f8f8f8; padding:2rem; border-radius:16px;">
                <h3>Payment details</h3>
                <p style="color:#666;">Stripe / PayPal / Momo integration will go here.</p>
                <div style="height:300px; background:#eee; border-radius:12px; display:flex; align-items:center; justify-content:center; margin-top:1rem; color:#999;">
                    [Payment form coming in next step]
                </div>
            </div>
        </div>

        <!-- Right: Order Summary -->
        <div id="checkout-items" style="background:#111; color:#F5B81B; padding:2rem; border-radius:20px;"></div>
    </div>

    <div style="text-align:center; margin-top:3rem;">
        <a href="{% url 'cart' %}" style="color:#111;">← Back to Cart</a>
    </div>
</div>
{% endblock %}
