# alertmanager/alertmanager.yml
global:
  smtp_smarthost: 'smtp.gmail.com:587'  # Example: Gmail
  smtp_from: 'goldendev24@gmail.com'
  smtp_auth_username: 'goldendev24@gmail.com'
  smtp_auth_password: 'xqoabcixrcrcgyvq'
  smtp_require_tls: true

# Templates for custom messages (optional)
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Routing tree
route:
  group_by: ['alertname', 'severity', 'container']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-receiver'
  
  routes:
    # Critical alerts → immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 1h
    
    # Database alerts → DBA team
    - match:
        service: database
      receiver: 'dba-team'

# Receivers (notification endpoints)
receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'christianhonore2003@gmail.com'
        send_resolved: true
        headers:
          Subject: '🔔 Alert: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          Alert: {{ .Labels.alertname }}
          Severity: {{ .Labels.severity }}
          Container: {{ .Labels.container }}
          Summary: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          {{ end }}

  - name: 'critical-alerts'
    email_configs:
      - to: 'christianhonore2003@gmail.com'
        send_resolved: true
    # Add Slack/PagerDuty/webhook here for critical alerts
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/XXX'
    #     channel: '#alerts-critical'
    #     send_resolved: true

  - name: 'dba-team'
    email_configs:
      - to: 'christianhonore2003@gmail.com'
        send_resolved: true

# Inhibition rules (suppress related alerts)
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'container']